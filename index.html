<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在宅状況回覧・管理システム (安定版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.5; }
      100% { transform: scale(0.95); opacity: 1; }
    }
    .pulse-dot {
      animation: pulse-ring 2s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

  <header class="bg-indigo-600 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="bg-white text-indigo-600 p-2 rounded-lg shadow">
          <i class="fa-solid fa-house-laptop text-2xl"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight">ステータス回覧板</h1>
          <p class="text-xs text-indigo-200">リアルタイム在宅・予定確認システム</p>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <span id="user-badge" class="bg-indigo-700 text-indigo-100 text-xs px-3 py-1.5 rounded-full font-mono flex items-center gap-1.5">
          <span id="status-indicator-dot" class="w-2 h-2 rounded-full bg-amber-400"></span>
          <span id="status-indicator-text">接続中...</span>
        </span>
        <button id="toggle-mode-btn" class="bg-white text-indigo-600 hover:bg-indigo-50 font-semibold text-sm px-4 py-2 rounded-lg shadow transition duration-200 flex items-center gap-2">
          <i class="fa-solid fa-lock"></i>
          <span id="toggle-mode-text">管理画面へログイン</span>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-6xl w-full mx-auto p-4 md:py-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
    
    <section class="lg:col-span-1 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-fit">
      <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
        <h2 class="font-bold text-slate-700 flex items-center gap-2">
          <i class="fa-solid fa-users text-indigo-500"></i>
          今見ている人
        </h2>
        <span id="active-count" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-0.5 rounded-full">0人</span>
      </div>
      <p class="text-xs text-slate-500 mb-4">リアルタイムでページを開いているユーザーです。</p>
      
      <div id="active-users-list" class="space-y-2.5 max-h-[300px] overflow-y-auto pr-1">
        <div class="text-center text-slate-400 py-4 text-xs">確認中...</div>
      </div>
    </section>

    <section class="lg:col-span-3 space-y-6">
      
      <div id="critical-error-box" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-r-xl shadow-sm">
        <div class="flex">
          <div class="flex-shrink-0"><i class="fa-solid fa-triangle-exclamation text-red-500 text-lg"></i></div>
          <div class="ml-3">
            <h3 class="text-sm font-bold text-red-800">接続エラーが発生しました</h3>
            <p id="critical-error-message" class="text-xs text-red-700 mt-1 font-mono whitespace-pre-wrap"></p>
            <p class="text-xs text-red-600 mt-2 font-sans">※Firebaseの設定、Authenticationの「匿名認証」の有効化、またはFirestoreの「セキュリティルール」を確認してください。</p>
          </div>
        </div>
      </div>

      <div id="alert-box" class="hidden border-l-4 p-4 rounded-r-xl shadow-sm">
        <div class="flex items-start">
          <div class="flex-shrink-0"><i class="fa-solid fa-circle-info text-lg"></i></div>
          <div class="ml-3"><p id="alert-message" class="text-sm font-medium"></p></div>
          <button onclick="hideAlert()" class="ml-auto text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>

      <div class="bg-gradient-to-r from-indigo-50 to-sky-50 rounded-2xl p-6 border border-indigo-100/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
          <div id="current-mode-badge" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-800 mb-2">
            <i class="fa-solid fa-eye"></i> 現在：回覧モード
          </div>
          <h2 id="mode-title" class="text-2xl font-black text-slate-800 tracking-tight">みんなの在宅・予定一覧</h2>
          <p id="mode-desc" class="text-sm text-slate-600 mt-1">リアルタイムで回覧・確認できます。</p>
        </div>
        <div class="text-right text-xs text-slate-400" id="last-updated-container">
          最終更新: <span id="global-last-updated">-</span>
        </div>
      </div>

      <div id="login-section" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-150">
        <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
          <i class="fa-solid fa-key text-amber-500"></i> 管理画面ログイン
        </h3>
        <div class="flex flex-col sm:flex-row gap-3 max-w-md">
          <input type="password" id="admin-password" placeholder="パスワードを入力 (デフォルト: admin)" class="flex-grow px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 text-sm outline-none">
          <button id="login-submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded-xl text-sm transition">認証</button>
        </div>
      </div>

      <div id="admin-view" class="hidden space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-user-plus text-indigo-500"></i> メンバーを新しく登録する
          </h3>
          <form id="add-member-form" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">名前 <span class="text-red-500">*</span></label>
                <input type="text" id="new-name" required placeholder="例: 山田 太郎" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">初期ステータス</label>
                <select id="new-status" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                  <option value="在宅中">🏠 在宅中</option>
                  <option value="外出中">🚗 外出中</option>
                  <option value="帰省中">🚄 帰省中</option>
                  <option value="連絡不可">📴 連絡不可</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">時間帯 (目安)</label>
                <input type="text" id="new-time-range" placeholder="例: 9:00 〜 17:00" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">どこへ (場所)</label>
                <input type="text" id="new-destination" placeholder="例: 自宅、東京本社" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">理由 / メモ</label>
                <input type="text" id="new-reason" placeholder="例: リモートワーク" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
              </div>
            </div>
            <div class="flex justify-end pt-2">
              <button type="submit" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-xl text-sm transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-check"></i> メンバーを登録
              </button>
            </div>
          </form>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-user-gear text-indigo-500"></i> 各メンバーの状況を変更
          </h3>
          <div id="admin-members-container" class="space-y-4"></div>
        </div>
      </div>

      <div id="viewer-view" class="space-y-6">
        <div class="flex flex-wrap justify-between items-center gap-3 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
          <div class="flex flex-wrap gap-2">
            <button onclick="filterStatus('all')" class="filter-btn bg-slate-900 text-white px-3.5 py-1.5 rounded-xl text-xs font-semibold shadow-sm transition">すべて</button>
            <button onclick="filterStatus('在宅中')" class="filter-btn bg-slate-100 hover:bg-slate-200 text-slate-700 px-3.5 py-1.5 rounded-xl text-xs font-semibold transition">🏠 在宅中</button>
            <button onclick="filterStatus('外出中')" class="filter-btn bg-slate-100 hover:bg-slate-200 text-slate-700 px-3.5 py-1.5 rounded-xl text-xs font-semibold transition">🚗 外出中</button>
            <button onclick="filterStatus('帰省中')" class="filter-btn bg-slate-100 hover:bg-slate-200 text-slate-700 px-3.5 py-1.5 rounded-xl text-xs font-semibold transition">🚄 帰省中</button>
            <button onclick="filterStatus('連絡不可')" class="filter-btn bg-slate-100 hover:bg-slate-200 text-slate-700 px-3.5 py-1.5 rounded-xl text-xs font-semibold transition">📴 連絡不可</button>
          </div>
          <div class="text-xs text-slate-500 flex gap-3">
            <span>🏠 在宅: <span id="stat-home" class="font-bold text-emerald-600">0</span>名</span>
            <span>🚗 外出・他: <span id="stat-away" class="font-bold text-indigo-600">0</span>名</span>
          </div>
        </div>

        <div id="viewer-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="col-span-full text-center py-12 bg-white rounded-2xl shadow-sm border border-slate-100">
            <i class="fa-solid fa-spinner animate-spin text-3xl text-indigo-500 mb-3 block"></i>
            <p class="text-slate-500 font-medium text-sm">最新データを同期しています...</p>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, collection, onSnapshot, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ============================================
    // ⚙️ FIREBASE CONFIG 設定エリア
    // ============================================
    let firebaseConfig = {};
    let appId = 'presence-circular-app';

    try {
      // 親環境（__firebase_config）が定義されていればパースして利用
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        firebaseConfig = JSON.parse(__firebase_config);
      } else {
        // ⚠️ 上記が空の場合、ここに自身のFirebaseコンフィグを直接記述してテストできます
        firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT_ID.appspot.com",
          messagingSenderId: "YOUR_SENDER_ID",
          appId: "YOUR_APP_ID"
        };
      }
      if (typeof __app_id !== 'undefined') appId = __app_id;
    } catch (e) {
      console.error("Config parse error:", e);
    }

    // 内部状態
    let db, auth;
    let user = null;
    let members = [];
    let activeUsers = [];
    let currentFilter = 'all';
    let isAdminMode = false;
    let isOfflineDemoMode = false; // Firebaseが死んでいる時の救済モード

    // DOM
    const statusIndicatorDot = document.getElementById('status-indicator-dot');
    const statusIndicatorText = document.getElementById('status-indicator-text');
    const viewerGrid = document.getElementById('viewer-grid');
    const adminMembersContainer = document.getElementById('admin-members-container');
    const activeUsersList = document.getElementById('active-users-list');
    const activeCount = document.getElementById('active-count');
    const criticalErrorBox = document.getElementById('critical-error-box');
    const criticalErrorMessage = document.getElementById('critical-error-message');
    const globalLastUpdated = document.getElementById('global-last-updated');

    // 1. システム起動
    const startSystem = async () => {
      // Configの簡易検証
      if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("YOUR_")) {
        showCriticalError("Firebaseの設定情報（__firebase_config）が正しくセットされていません。一時的なオフラインデモモードで起動します。");
        startDemoMode();
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        // 認証監視開始
        onAuthStateChanged(auth, (authUser) => {
          if (authUser) {
            user = authUser;
            statusIndicatorDot.className = "w-2 h-2 rounded-full bg-green-400";
            statusIndicatorText.textContent = `接続中: ${user.uid.substring(0,6)}...`;
            startPresenceTracking();
            startDataSync();
          }
        });

        // 匿名ログイン試行
        await signInAnonymously(auth);

      } catch (error) {
        console.error("Firebase Initialization Error:", error);
        showCriticalError(`Firebaseへの接続に失敗しました。\nエラーコード: ${error.code}\nメッセージ: ${error.message}`);
        startDemoMode(); // 失敗したらデモモードへ
      }
    };

    // 2. リアルタイムデータ同期
    function startDataSync() {
      try {
        const membersQuery = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        
        // データの受信を監視
        onSnapshot(membersQuery, (snapshot) => {
          criticalErrorBox.classList.add('hidden'); // 成功したらエラーを消す
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          
          members = list.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
          
          renderStatusBoard();
          renderAdminPanel();
          updateStats();
          updateLastGlobalTime();
        }, (error) => {
          console.error("Firestore Snapshot Error (Permission?):", error);
          showCriticalError(`データ同期エラー（権限不足の可能性があります）\nFirestoreのセキュリティルールを確認してください。\nDetails: ${error.message}`);
          startDemoMode();
        });

        // 閲覧中ユーザーの監視
        const presenceQuery = collection(db, 'artifacts', appId, 'public', 'data', 'presence');
        onSnapshot(presenceQuery, (snapshot) => {
          const users = [];
          const now = Date.now();
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.lastActive) {
              const t = data.lastActive.toDate ? data.lastActive.toDate().getTime() : new Date(data.lastActive).getTime();
              if (now - t < 60000) users.push(data);
            }
          });
          activeUsers = users;
          renderActiveUsers();
        }, (e) => console.log("Presence tracking offline or restricted"));

      } catch (e) {
        showCriticalError("同期プロセスの開始に失敗しました。");
      }
    }

    // 3. アクティブトラッキング
    async function startPresenceTracking() {
      if (isOfflineDemoMode || !user) return;
      const pRef = doc(db, 'artifacts', appId, 'public', 'data', 'presence', user.uid);
      const update = () => setDoc(pRef, { userId: user.uid, lastActive: new Date(), device: navigator.userAgent.includes('Mobile') ? 'モバイル' : 'PC' }, { merge: true }).catch(e=>'');
      update();
      setInterval(update, 25000);
    }

    // ============================================
    // 💾 救済用：ローカルデモモード (Firebase接続不可時)
    // ============================================
    function startDemoMode() {
      isOfflineDemoMode = true;
      statusIndicatorDot.className = "w-2 h-2 rounded-full bg-red-500 pulse-dot";
      statusIndicatorText.textContent = "オフライン・デモモード";
      
      // 初期ダミーデータ
      members = [
        { id: "demo1", name: "山田 太郎", status: "在宅中", destination: "自宅", timeRange: "9:00〜18:00", reason: "リモートワーク実施中", updatedAt: new Date() },
        { id: "demo2", name: "佐藤 次郎", status: "外出中", destination: "渋谷オフィス", timeRange: "13:00〜17:00", reason: "クライアント定期商談", updatedAt: new Date(Date.now() - 3600000) }
      ];
      activeUsers = [{ userId: "LOCAL_USER", device: "PC", lastActive: new Date() }];
      
      renderStatusBoard();
      renderAdminPanel();
      renderActiveUsers();
      updateStats();
      globalLastUpdated.textContent = "デモ動作中";
    }

    // ============================================
    // 🖌️ レンダリング・UI操作
    // ============================================
    function renderStatusBoard() {
      viewerGrid.innerHTML = '';
      const filtered = members.filter(m => currentFilter === 'all' || m.status === currentFilter);

      if (filtered.length === 0) {
        viewerGrid.innerHTML = `<div class="col-span-full text-center py-12 bg-white rounded-2xl border text-slate-400 text-sm">メンバーがいません。</div>`;
        return;
      }

      filtered.forEach(m => {
        const colors = getStatusColors(m.status);
        const card = document.createElement('div');
        card.className = "bg-white p-6 rounded-2xl border border-slate-100 flex flex-col justify-between shadow-sm transition hover:shadow-md";
        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start mb-4">
              <div>
                <h4 class="text-xl font-bold text-slate-800">${escapeHtml(m.name)}</h4>
                <p class="text-xs text-slate-400 mt-0.5"><i class="fa-regular fa-clock"></i> ${formatRelativeTime(m.updatedAt)}</p>
              </div>
              <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold ${colors.badge}">${colors.icon} ${m.status}</span>
            </div>
            <div class="space-y-2 bg-slate-50 p-4 rounded-xl border text-sm">
              <div><span class="text-[10px] text-slate-400 block font-bold">📍 どこへ</span><span class="text-slate-700 font-medium">${escapeHtml(m.destination) || '---'}</span></div>
              <div><span class="text-[10px] text-slate-400 block font-bold">⏱ 時間帯</span><span class="text-slate-700 font-medium">${escapeHtml(m.timeRange) || '---'}</span></div>
              <div><span class="text-[10px] text-slate-400 block font-bold">💡 理由 / メモ</span><p class="text-slate-700 font-medium">${escapeHtml(m.reason) || '---'}</p></div>
            </div>
          </div>
        `;
        viewerGrid.appendChild(card);
      });
    }

    function renderAdminPanel() {
      adminMembersContainer.innerHTML = '';
      members.forEach(m => {
        const card = document.createElement('div');
        card.className = "p-4 bg-slate-50 rounded-xl border flex flex-col gap-3";
        card.innerHTML = `
          <div class="flex justify-between items-center pb-2 border-b">
            <span class="font-bold text-slate-800">${escapeHtml(m.name)}</span>
            <div class="flex gap-2">
              <select onchange="updateMemberField('${m.id}', 'status', this.value)" class="bg-white px-2 py-1 border rounded text-xs">
                <option value="在宅中" ${m.status === '在宅中' ? 'selected' : ''}>🏠 在宅中</option>
                <option value="外出中" ${m.status === '外出中' ? 'selected' : ''}>🚗 外出中</option>
                <option value="帰省中" ${m.status === '帰省中' ? 'selected' : ''}>🚄 帰省中</option>
                <option value="連絡不可" ${m.status === '連絡不可' ? 'selected' : ''}>📴 連絡不可</option>
              </select>
              <button onclick="deleteMember('${m.id}')" class="text-red-500 hover:bg-red-50 p-1 rounded text-xs"><i class="fa-solid fa-trash-can"></i></button>
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 text-xs">
            <input type="text" value="${escapeHtml(m.destination)}" placeholder="場所" onchange="updateMemberField('${m.id}', 'destination', this.value)" class="p-1.5 border rounded">
            <input type="text" value="${escapeHtml(m.timeRange)}" placeholder="時間" onchange="updateMemberField('${m.id}', 'timeRange', this.value)" class="p-1.5 border rounded">
            <input type="text" value="${escapeHtml(m.reason)}" placeholder="理由" onchange="updateMemberField('${m.id}', 'reason', this.value)" class="p-1.5 border rounded">
          </div>
        `;
        adminMembersContainer.appendChild(card);
      });
    }

    function renderActiveUsers() {
      activeUsersList.innerHTML = '';
      activeCount.textContent = `${activeUsers.length}人`;
      activeUsers.forEach(u => {
        const div = document.createElement('div');
        div.className = "flex items-center justify-between p-2 bg-slate-50 rounded-lg text-xs";
        div.innerHTML = `<span class="font-mono text-slate-600 truncate">👤 ${u.userId.substring(0,10)}...</span><span class="text-[10px] bg-slate-200 px-1 rounded">${u.device || 'PC'}</span>`;
        activeUsersList.appendChild(div);
      });
    }

    // CUD 操作のラップ (デモモードとハイブリッド)
    document.getElementById('add-member-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const d = {
        name: document.getElementById('new-name').value,
        status: document.getElementById('new-status').value,
        destination: document.getElementById('new-destination').value,
        timeRange: document.getElementById('new-time-range').value,
        reason: document.getElementById('new-reason').value,
        updatedAt: isOfflineDemoMode ? new Date() : serverTimestamp()
      };

      if (isOfflineDemoMode) {
        d.id = "demo_" + Date.now();
        members.unshift(d);
        renderAll();
      } else {
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'members'), d);
      }
      document.getElementById('add-member-form').reset();
      showAlert("登録しました", "success");
    });

    window.updateMemberField = async function(id, field, value) {
      if (isOfflineDemoMode) {
        const m = members.find(x => x.id === id);
        if (m) { m[field] = value; m.updatedAt = new Date(); renderAll(); }
      } else {
        const d = {}; d[field] = value; d['updatedAt'] = serverTimestamp();
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id), d);
      }
    };

    window.deleteMember = async function(id) {
      if (!confirm("削除しますか？")) return;
      if (isOfflineDemoMode) {
        members = members.filter(x => x.id !== id);
        renderAll();
      } else {
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id));
      }
      showAlert("削除しました", "success");
    };

    // ヘルパー
    function renderAll() { renderStatusBoard(); renderAdminPanel(); updateStats(); }
    function showCriticalError(msg) { criticalErrorBox.classList.remove('hidden'); criticalErrorMessage.textContent = msg; }
    function escapeHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
    function updateStats() {
      const home = members.filter(m => m.status === '在宅中').length;
      document.getElementById('stat-home').textContent = home;
      document.getElementById('stat-away').textContent = members.length - home;
    }
    function updateLastGlobalTime() {
      if(members.length > 0 && members[0].updatedAt) {
        const d = members[0].updatedAt.toDate ? members[0].updatedAt.toDate() : new Date(members[0].updatedAt);
        globalLastUpdated.textContent = d.toLocaleTimeString();
      }
    }
    function formatRelativeTime(t) {
      if(!t) return '---';
      const d = t.toDate ? t.toDate() : new Date(t);
      const diff = Math.floor((new Date() - d) / 60000);
      return diff < 1 ? 'たった今' : diff < 60 ? `${diff}分前` : d.toLocaleTimeString();
    }
    function getStatusColors(s) {
      if(s==='在宅中') return {badge:'bg-emerald-50 text-emerald-700 border-emerald-200', icon:'🏠'};
      if(s==='外出中') return {badge:'bg-amber-50 text-amber-700 border-amber-200', icon:'🚗'};
      if(s==='帰省中') return {badge:'bg-indigo-50 text-indigo-700 border-indigo-200', icon:'🚄'};
      return {badge:'bg-rose-50 text-rose-700 border-rose-200', icon:'📴'};
    }
    window.filterStatus = function(s) { currentFilter = s; renderStatusBoard(); };

    // 通知・アラート制御
    function showAlert(message, type = "error") {
      const alertBox = document.getElementById('alert-box');
      const alertMessage = document.getElementById('alert-message');
      alertBox.classList.remove('hidden', 'bg-red-50', 'border-red-500', 'text-red-800', 'bg-emerald-50', 'border-emerald-500', 'text-emerald-800');
      if (type === "success") {
        alertBox.classList.add('bg-emerald-50', 'border-emerald-500');
        alertMessage.className = "text-sm text-emerald-800 font-medium";
      } else {
        alertBox.classList.add('bg-red-50', 'border-red-500');
        alertMessage.className = "text-sm text-red-800 font-medium";
      }
      alertMessage.textContent = message;
      setTimeout(window.hideAlert, 4000);
    }
    window.hideAlert = function() { document.getElementById('alert-box').add('hidden'); };

    // モード切替管理
    const toggleModeBtn = document.getElementById('toggle-mode-btn');
    const loginSection = document.getElementById('login-section');
    toggleModeBtn.addEventListener('click', () => {
      if (isAdminMode) {
        isAdminMode = false;
        applyModeUI();
      } else {
        loginSection.classList.toggle('hidden');
      }
    });
    document.getElementById('login-submit-btn').addEventListener('click', () => {
      if(document.getElementById('admin-password').value === 'admin') {
        isAdminMode = true; loginSection.classList.add('hidden'); applyModeUI();
      } else { alert('パスワード不一致'); }
    });
    function applyModeUI() {
      document.getElementById('admin-view').classList.toggle('hidden', !isAdminMode);
      document.getElementById('viewer-view').classList.toggle('hidden', isAdminMode);
      toggleModeBtn.textContent = isAdminMode ? "ログアウト" : "管理画面へログイン";
    }

    // 起動
    startSystem();
  </script>
</body>
</html>
